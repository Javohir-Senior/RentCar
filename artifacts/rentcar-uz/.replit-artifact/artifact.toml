kind = "web"
previewPath = "/"
title = "RentCar O'zbekistan"
version = "1.0.0"
id = "artifacts/rentcar-uz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23518

[services.development]
run = "pnpm --filter @workspace/rentcar-uz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rentcar-uz", "run", "build" ]
publicDir = "artifacts/rentcar-uz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23518"
BASE_PATH = "/"
